# Вставка в /etc/nginx/conf.d/kanban-frontend.conf
# Исправление цикла редиректов (ERR_TOO_MANY_REDIRECTS) когда Jino передаёт HTTPS на порт 80.
# На порту 80: редирект только если запрос не по HTTPS (нет X-Forwarded-Proto: https).

server {
    server_name antexpress.ru www.antexpress.ru;
    root /opt/kanban_python/app/frontend/dist;
    index index.html;
    location ^~ /media/ {
        alias /opt/kanban_python/app/backend/media/;
    }
    # Установщик Windows (Tauri): положите файл в /opt/kanban_python/desktop-releases/ (например AntExpress-Setup.exe)
    location ^~ /downloads/ {
        alias /opt/kanban_python/desktop-releases/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/antexpress.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antexpress.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name antexpress.ru www.antexpress.ru;
    # Не редиректить, если запрос уже пришёл по HTTPS через прокси (Jino)
    if ($http_x_forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }
    root /opt/kanban_python/app/frontend/dist;
    index index.html;
    location ^~ /media/ {
        alias /opt/kanban_python/app/backend/media/;
    }
    location ^~ /downloads/ {
        alias /opt/kanban_python/desktop-releases/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
